services:
  sub-preprocessor:
    build:
      context: .
      dockerfile: Dockerfile
    image: sub-preprocessor:latest
    container_name: sub-preprocessor
    user: "1000:1000" # config owner: read the 0400 agenix secret + write /config/.geoblock.db
    ports:
      - "7008:8080"
    volumes:
      - ./config:/config:rw
      # agenix-decrypted secret; the Gemini key is read from it (geoblock.gemini.key_file)
      - /run/agenix/litellm-env:/run/agenix/litellm-env:ro
    restart: always

  tg-sub-crawler:
    image: sub-preprocessor:latest
    container_name: tg-sub-crawler
    command: ["crawl"]
    user: "0:0"
    depends_on:
      - sub-preprocessor
    volumes:
      - ./config:/config:rw
    environment:
      # Seed channels live in config/channels.yaml (hot-reloaded each cycle).
      # CRAWL_CHANNELS (comma/space list) still works as an extra override.
      - CRAWL_CHANNELS_FILE=/config/channels.yaml
      - CRAWL_PRIVATE=/config/private.yaml
      - TZ=Europe/Moscow
      - CRAWL_AT=04:00       # run once daily at 04:00 MSK (falls back to CRAWL_INTERVAL if unset)
      - CRAWL_INTERVAL=30m
      - CRAWL_PAGES=6
      - CRAWL_PRUNE=1
      - CRAWL_DEPTH=2
      - CRAWL_MAX_CHANNELS=0   # 0 = no cap (visited-set still prevents re-visiting channels within a cycle)
      - CRAWL_STATE=/config/.crawler-state.json
      - CRAWL_STATE_TTL=720h
      # --- Optional: MTProto userbot push (real-time posts instead of polling) ---
      # api_id/api_hash from https://my.telegram.org (a USER account). To log in,
      # set CRAWL_HTTP below + expose the port, then open GET /qr in a browser and
      # scan the QR (Telegram -> Settings -> Devices -> Link Desktop Device). Or scan
      # the console QR by running once on a TTY: docker compose run --rm tg-sub-crawler.
      # gotd caches the session to CRAWL_TG_SESSION (0600) so the detached service
      # reuses it and skips the QR next time. With the userbot on, the poll above is
      # just a backfill — CRAWL_AT can stay nightly.
      # - CRAWL_TG_API_ID=0
      # - CRAWL_TG_API_HASH=
      # - CRAWL_TG_SESSION=/config/.tg-session.json
      # - CRAWL_TG_2FA=            # only if the account has a 2FA password
      # - CRAWL_HTTP=:8081      # required for the GET /qr login page (also enables POST /crawl)
    restart: unless-stopped
