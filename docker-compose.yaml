services:
  sub-preprocessor:
    build:
      context: .
      dockerfile: Dockerfile
    image: sub-preprocessor:latest
    container_name: sub-preprocessor
    ports:
      - "7008:8080"
    volumes:
      - ./config:/config:ro
    restart: always

  gemini-block-checker:
    image: alpine:3.21
    container_name: gemini-block-checker
    network_mode: host
    entrypoint: ["/bin/sh", "-c"]
    command:
      - |
        apk add --no-cache curl bash bind-tools
        wget -qO /usr/local/bin/yq https://github.com/mikefarah/yq/releases/latest/download/yq_linux_amd64
        chmod +x /usr/local/bin/yq
        export GEMINI_API_KEY="$(sed -n 's/^LITELLM_GOOGLE_API_KEY=//p' /run/agenix/litellm-env)"
        exec /scripts/asn-block-check.sh
    volumes:
      - ./config:/config:rw
      - ./scripts:/scripts:ro
      # agenix-decrypted secret; key read from it at container start (survives reboot/restart)
      - /run/agenix/litellm-env:/run/agenix/litellm-env:ro
    environment:
      - INTERVAL=300
      - CONFIG=/config/config.yaml
    restart: unless-stopped

  tg-sub-crawler:
    image: sub-preprocessor:latest
    container_name: tg-sub-crawler
    command: ["crawl"]
    user: "0:0"
    depends_on:
      - sub-preprocessor
    volumes:
      - ./config:/config:rw
    environment:
      # Seed channels live in config/channels.yaml (hot-reloaded each cycle).
      # CRAWL_CHANNELS (comma/space list) still works as an extra override.
      - CRAWL_CHANNELS_FILE=/config/channels.yaml
      - CRAWL_PRIVATE=/config/private.yaml
      - TZ=Europe/Moscow
      - CRAWL_AT=04:00       # run once daily at 04:00 MSK (falls back to CRAWL_INTERVAL if unset)
      - CRAWL_INTERVAL=30m
      - CRAWL_PAGES=6
      - CRAWL_PRUNE=1
      - CRAWL_DEPTH=2
      - CRAWL_MAX_CHANNELS=0   # 0 = no cap (visited-set still prevents re-visiting channels within a cycle)
      - CRAWL_STATE=/config/.crawler-state.json
      - CRAWL_STATE_TTL=720h
    restart: unless-stopped
