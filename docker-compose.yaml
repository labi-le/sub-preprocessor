services:
  sub-preprocessor:
    build:
      context: .
      dockerfile: Dockerfile
    image: sub-preprocessor:latest
    container_name: sub-preprocessor
    user: "1000:1000" # config owner: read the 0400 agenix secret + write /config/.geoblock.db
    ports:
      - "7008:8080"
    volumes:
      - ./config:/config:rw
      # agenix-decrypted secret; the Gemini key is read from it (geoblock.gemini.key_file)
      - /run/agenix/litellm-env:/run/agenix/litellm-env:ro
    restart: always

  tg-sub-crawler:
    image: sub-preprocessor:latest
    container_name: tg-sub-crawler
    command: ["crawl"]
    user: "0:0"
    depends_on:
      - sub-preprocessor
    volumes:
      - ./config:/config:rw
    ports:
      - "127.0.0.1:8081:8081"    # GET /qr login page + POST /crawl; localhost-only, SSH-tunnel to reach
    env_file:
      # MTProto api_id/api_hash from the agenix secret (server-only, never committed);
      # defined in ~/nixos hosts/configuration-server.nix as age.secrets.tg-crawler-env.
      - path: /run/agenix/tg-crawler-env
        required: false          # absent -> userbot disabled, nightly poll still runs
    environment:
      # Seed channels live in config/channels.yaml (hot-reloaded each cycle).
      # CRAWL_CHANNELS (comma/space list) still works as an extra override.
      - CRAWL_CHANNELS_FILE=/config/channels.yaml
      - CRAWL_PRIVATE=/config/private.yaml
      - TZ=Europe/Moscow
      - CRAWL_AT=04:00       # run once daily at 04:00 MSK (falls back to CRAWL_INTERVAL if unset)
      - CRAWL_INTERVAL=30m
      - CRAWL_PAGES=6
      - CRAWL_PRUNE=1
      - CRAWL_DEPTH=2
      - CRAWL_MAX_CHANNELS=0   # 0 = no cap (visited-set still prevents re-visiting channels within a cycle)
      - CRAWL_STATE=/config/.crawler-state.json
      - CRAWL_STATE_TTL=720h
      # --- MTProto userbot push (real-time posts; api_id/api_hash from env_file above) ---
      # First run: open http://127.0.0.1:8081/qr (SSH-tunnel from your machine) and scan
      # the QR in Telegram -> Devices -> Link Desktop Device. gotd caches the session to
      # CRAWL_TG_SESSION so restarts skip the QR. With push on, CRAWL_AT (poll) is backfill.
      - CRAWL_TG_SESSION=/config/.tg-session.json
      - CRAWL_HTTP=:8081
    restart: unless-stopped
