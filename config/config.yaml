log:
  level: info
server:
  listen: :8080
geofeed:
  refresh_interval: 24h
  sources:
    - url: https://github.com/ipanalytics/GeoFeed-Harvester/releases/latest/download/geofeed.csv.gz
      type: gzip
    - url: https://raw.githubusercontent.com/Simonadascalu/Freedomtech-Geofeed/refs/heads/main/Freedomtech%20solutions%20-%20ALL
      type: raw
resolver:
  timeout: 5s
  cache_ttl: 1h
  cache_negative_ttl: 10m
workflow:
  stages:
    - asn
    - geofeed
asn:
  deny_patterns: []
  timeout: 5s
geoblock:
  db_path: /config/.geoblock.db
  ttl: 720h
  gemini:
    enabled: true
    model: gemini-2.0-flash
    key_file: /run/agenix/litellm-env
    key_var: LITELLM_GOOGLE_API_KEY
    timeout: 15s
    concurrency: 8
deadcache:
  db_path: /config/.deadnodes.db
  ttl: 2h
groups:
  nato:
    - "AL"
    - "BE"
    - "BG"
    - "CA"
    - "HR"
    - "CZ"
    - "DK"
    - "EE"
    - "FI"
    - "FR"
    - "DE"
    - "GR"
    - "HU"
    - "IS"
    - "IT"
    - "LV"
    - "LT"
    - "LU"
    - "ME"
    - "NL"
    - "MK"
    - "NO"
    - "PL"
    - "PT"
    - "RO"
    - "SK"
    - "SI"
    - "ES"
    - "SE"
    - "TR"
    - "GB"
    - "US"
  geo_blocked:
    - "RU"
    - "IR"
    - "SY"
    - "KP"
    - "CU"
