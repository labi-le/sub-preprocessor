log:
  level: info # debug is verbose (per-node/DNS/probe); it is hot-reloadable, so turn it on live only when troubleshooting
server:
  listen: :8080
  metrics_listen: :9090 # internal Prometheus metrics endpoint; keep loopback-only (published via docker-compose)
geo:
  # Shared geo providers used by the country/asn filters and by annotation.
  # Optional blocks `dbip:` (url, refresh_interval; default: DB-IP Country
  # Lite monthly CSV, 24h) and `registry:` (urls, refresh_interval; default:
  # the 5 RIR delegated-extended files, 24h) configure the downloadable
  # in-memory databases used by the matching annotate providers; the defaults
  # suffice, so they are omitted here.
  geofeed:
    refresh_interval: 24h
    sources:
      - url: https://github.com/ipanalytics/GeoFeed-Harvester/releases/latest/download/geofeed.csv.gz
        type: gzip
      - url: https://raw.githubusercontent.com/Simonadascalu/Freedomtech-Geofeed/refs/heads/main/Freedomtech%20solutions%20-%20ALL
        type: raw
  asn:
    timeout: 5s
    cache_ttl: 24h # in-memory cache of Cymru ASN lookups; geolocations rarely change (0 = default 24h)
resolver:
  timeout: 5s
  cache_ttl: 1h
  cache_negative_ttl: 10m
# Unified, ordered filter list. IP-stage filters (country/asn) run per-node in
# preprocess; through-node filters (gemini/claude/bandwidth) run post-probe in
# the stable worker. Order is honoured within each stage.
filters:
  - type: country
    provider: geofeed
    # exclude_groups: [geo_blocked]  # TEMP: left empty so inline (mostly RU/IR/CN) nodes pass the geo filter; empty => no country drop
  - type: claude
  - type: bandwidth # drop nodes slower than min_mbps (last: runs on the fewest nodes)
    test_url: "https://speed.cloudflare.com/__down?bytes=2000000" # Cloudflare speed generator; egresses through the node
    min_mbps: 5 # drop nodes below this; 0 = no floor (annotate only). Raise test_url ?bytes= for higher thresholds
    timeout: 20s # per-node download deadline
    concurrency: 4 # parallel downloads; higher shares the host uplink and can under-report fast nodes
# Ordered annotation tags added to node names (both / and /stable.txt).
annotate:
  - tag: GEO # [GEO:xx], [GEO:??] when every provider misses
    # Ordered chain, first hit wins: dbip/registry are downloaded in-memory
    # databases (built only because they are referenced here), asn is the
    # cached Cymru DNS last resort.
    providers: [geofeed, dbip, registry, asn]
  - tag: IP # [IP:1.2.3.4] of the chosen address
geoblock:
  db_path: /config/.geoblock.db
  ttl: 720h
  gemini:
    model: gemini-2.0-flash
    key_file: /run/agenix/litellm-env
    key_var: LITELLM_GOOGLE_API_KEY
    timeout: 15s
    concurrency: 8
  claude:
    timeout: 15s
    concurrency: 8
deadcache:
  ttl: 2h # decouple from subscriptions.interval: a per-cycle TTL would make the dead-node cache a no-op. Set 0s to disable.
fetch:
  # HTTP fetch timeout per subscription; unresponsive sources fail fast
  timeout: 3s
groups:
  nato:
    - "AL"
    - "BE"
    - "BG"
    - "CA"
    - "HR"
    - "CZ"
    - "DK"
    - "EE"
    - "FI"
    - "FR"
    - "DE"
    - "GR"
    - "HU"
    - "IS"
    - "IT"
    - "LV"
    - "LT"
    - "LU"
    - "ME"
    - "NL"
    - "MK"
    - "NO"
    - "PL"
    - "PT"
    - "RO"
    - "SK"
    - "SI"
    - "ES"
    - "SE"
    - "TR"
    - "GB"
    - "US"
  geo_blocked:
    - "RU"
    - "IR"
    - "SY"
    - "KP"
    - "CU"
    - "CN"
    - "BY"
subscriptions:
  interval: 1h
  check:
    # URL-test (latency) prober params only; through-node filters live in `filters`.
    rounds: 2
    timeout: 1000ms
    max_fail: 1
    max_avg_ms: 800
    concurrency: 96
    source_timeout: 5m
    # test_url: https://www.gstatic.com/generate_204 # default: latency-probe target fetched through each node
    # expected_status: "204" # default: accepted status(es), mihomo IntRanges syntax
