log:
  level: info

server:
  listen: :8080

geofeed:
  refresh_interval: 24h
  sources:
    - url: https://github.com/ipanalytics/GeoFeed-Harvester/releases/latest/download/geofeed.csv.gz
      type: gzip
    - url: https://raw.githubusercontent.com/Simonadascalu/Freedomtech-Geofeed/refs/heads/main/Freedomtech%20solutions%20-%20ALL
      type: raw

resolver:
  timeout: 5s

workflow:
  stages:
    - asn
    - geofeed

asn:
  deny_patterns:
    - "(?i)VDSINA"
    - "(?i)HOSTOFF"
    - "(?i)ServHost"
  timeout: 5s

groups:
  nato:
    - "AL"
    - "BE"
    - "BG"
    - "CA"
    - "HR"
    - "CZ"
    - "DK"
    - "EE"
    - "FI"
    - "FR"
    - "DE"
    - "GR"
    - "HU"
    - "IS"
    - "IT"
    - "LV"
    - "LT"
    - "LU"
    - "ME"
    - "NL"
    - "MK"
    - "NO"
    - "PL"
    - "PT"
    - "RO"
    - "SK"
    - "SI"
    - "ES"
    - "SE"
    - "TR"
    - "GB"
    - "US"
  geo_blocked:
    - "RU"
    - "IR"
    - "SY"
    - "KP"
    - "CU"
    - "CN"
    - "BY"
